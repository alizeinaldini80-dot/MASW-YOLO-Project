# Base Configuration for MASW-YOLO Training
# Default hyperparameters based on the MASW-YOLO paper.

# Data                                          
data: data/dataset.yaml   

# Training
epochs: 100
batch: 16
imgsz: 640
workers: 8
device: 0  

# Optimizer
optimizer: SGD
lr0: 0.01
lrf: 0.01  
momentum: 0.937
weight_decay: 0.0005

warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# Loss
box: 7.5     
cls: 0.5     
dfl: 1.5     

# Data augmentation
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0

# Model
model: yolov8n.yaml  

  
project: /content/drive/MyDrive/VisDrone_Project/runs/train  
exist_ok: true                                
verbose: true                                    
