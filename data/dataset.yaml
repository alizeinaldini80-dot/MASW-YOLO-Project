# data/dataset.yaml
#
# پیکربندی دیتاست VisDrone2019
#
# دو حالت مسیر در ادامه آمده؛ همیشه فقط یکی از دو خط «path» باید فعال (بدون #) باشد.

# ------------------------------------------------------------------
# حالت ۱) اجرای لوکال / سروری که دیتاست مستقیم روی دیسک آن قرار دارد
# (این خط را با مسیر واقعی روی سیستم خودت جایگزین/فعال کن)
# path: D:/Projects/MASW-YOLO-PROJECT/dataset/VisDrone
# ------------------------------------------------------------------

# ------------------------------------------------------------------
# حالت ۲) اجرا در Google Colab
# چون خواندن مستقیم از Google Drive کند است، دیتاست ابتدا از Drive به
# فضای اجرای (runtime) خودِ کولب کپی/اکسترکت می‌شود (مثلاً /content/VisDrone)
# و train.py از همین مسیر محلی کولب می‌خواند، نه از /content/drive/...
#
# پیش‌نیاز (در نوت‌بوک، قبل از اجرای train.py):
#   from google.colab import drive
#   drive.mount('/content/drive')
#   !cp /content/drive/MyDrive/VisDrone_Project/dataset/VisDrone.zip /content/
#   !unzip -q /content/VisDrone.zip -d /content/
# ------------------------------------------------------------------
path: /content/VisDrone

# مسیرهای تصاویر (نسبت به path) - Ultralytics به‌صورت خودکار "images" را در مسیر
# به "labels" تبدیل می‌کند تا فایل‌های annotation متناظر را پیدا کند
train: images/train   # 6471 تصویر
val: images/val       # 548 تصویر
test: images/test     # 1610 تصویر

# کلاس‌ها (VisDrone2019 - 10 کلاس)
names:
  0: pedestrian
  1: people
  2: bicycle
  3: car
  4: van
  5: truck
  6: tricycle
  7: awning-tricycle
  8: bus
  9: motor
